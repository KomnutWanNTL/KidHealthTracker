<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon-v2.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/pwa-icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/pwa-icon-152.png" />
    <link rel="apple-touch-icon" href="/pwa-icon-v2.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#F8FAFC" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="KidHealth" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="KidHealth Tracker" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://qkgpacyhjuexhbcsyyxo.supabase.co" />
    <link rel="preconnect" href="https://vitals.vercel-insights.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all';this.onload=null"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    </noscript>
    <style>
      .app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #F8FAFC;
      }
      .dark .app-loading {
        background: #0F172A;
      }
      .app-loading__text {
        color: #94A3B8;
        font-size: 14px;
        font-weight: 600;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .dark .app-loading__text {
        color: #64748B;
      }
    </style>
    <script>
      (function() {
        var stored = localStorage.getItem('kidhealth-dark-mode');
        var dark;
        if (stored === 'on') dark = true;
        else if (stored === 'off') dark = false;
        else dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.classList.add('dark');
        document.querySelector('meta[name="theme-color"]').content = dark ? '#0F172A' : '#F8FAFC';
      })();
    </script>
    <title>KidHealth Tracker</title>
  </head>
  <body>
    <div id="app">
      <div class="app-loading">
        <p class="app-loading__text">กำลังโหลด...</p>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
